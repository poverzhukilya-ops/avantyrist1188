<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=yes">
    <title>Регламент группы | Avantyurist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 1.5rem 1rem;
        }

        .container {
            max-width: 520px;
            width: 100%;
            margin: 0 auto;
        }

        .hero-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Изображение группы */
        .group-image-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .group-image {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 50%;
            display: block;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .group-image:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(102, 126, 234, 0.3);
            border-color: rgba(102, 126, 234, 0.4);
        }

        /* Заголовки */
        .main-title {
            font-size: clamp(1.8rem, 8vw, 2.3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 50%, #c4b5fd 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 0.3rem;
            line-height: 1.2;
        }
        
        .group-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: #e2e8f0;
            text-align: center;
            margin-bottom: 0.3rem;
            letter-spacing: -0.01em;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-align: center;
            margin-bottom: 1.8rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* Окно с вкладками */
        .tabs-window {
            background: rgba(0, 0, 0, 0.15);
            border-radius: 24px;
            margin: 1.5rem 0 1rem;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 460px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        .tabs-window::-webkit-scrollbar {
            width: 4px;
        }
        .tabs-window::-webkit-scrollbar-track {
            background: transparent;
        }
        .tabs-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        .tabs-window::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .tabs-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Кнопки вкладок */
        .tab-button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px;
            padding: 14px 18px;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            transition: all 0.25s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 14px;
            width: 100%;
            text-align: left;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            text-decoration: none;
        }

        .tab-button:hover {
            background: rgba(102, 126, 234, 0.15);
            border-color: rgba(102, 126, 234, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(102, 126, 234, 0.2);
            color: #fff;
        }

        .tab-button:active {
            transform: translateY(0);
            transition: all 0.1s;
        }

        .tab-icon {
            font-size: 1.5rem;
            flex-shrink: 0;
            width: 36px;
            text-align: center;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
        }

        .tab-text {
            flex: 1;
            line-height: 1.4;
            font-weight: 500;
        }

        /* Особый стиль для кнопки рейтинга */
        .tab-button:last-child {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.12), rgba(251, 191, 36, 0.08));
            border-color: rgba(251, 191, 36, 0.2);
        }

        .tab-button:last-child:hover {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(251, 191, 36, 0.12));
            border-color: rgba(251, 191, 36, 0.4);
            box-shadow: 0 10px 20px -10px rgba(251, 191, 36, 0.2);
        }

        /* Декоративная линия */
        .decor-line {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #667eea, #764ba2, transparent);
            margin: 1.2rem auto 0.8rem;
            border-radius: 3px;
        }

        /* Информационный текст */
        .info-text {
            margin-top: 1rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.75rem;
        }

        .info-text p {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 0.2rem;
        }

        .badge-new {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            font-size: 0.6rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 30px;
            margin-left: 6px;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }

        /* Адаптив */
        @media (max-width: 550px) {
            body {
                padding: 1rem 0.75rem;
            }

            .hero-card {
                padding: 1.5rem 1.2rem;
                border-radius: 32px;
            }

            .main-title {
                font-size: 1.8rem;
            }

            .group-name {
                font-size: 1.2rem;
            }

            .group-image {
                width: 110px;
                height: 110px;
            }

            .tabs-window {
                max-height: 400px;
                padding: 0.8rem;
            }

            .tab-button {
                padding: 12px 14px;
                font-size: 14px;
                gap: 12px;
            }

            .tab-icon {
                font-size: 1.3rem;
                width: 32px;
            }
        }

        @media (max-width: 380px) {
            .hero-card {
                padding: 1.2rem 1rem;
            }

            .group-image {
                width: 95px;
                height: 95px;
            }

            .tab-button {
                padding: 10px 12px;
                font-size: 13px;
            }

            .tab-icon {
                font-size: 1.2rem;
                width: 28px;
            }
        }

        /* Анимация для вкладок */
        .tab-button {
            animation: slideIn 0.4s ease backwards;
        }

        .tab-button:nth-child(1) { animation-delay: 0.05s; }
        .tab-button:nth-child(2) { animation-delay: 0.1s; }
        .tab-button:nth-child(3) { animation-delay: 0.15s; }
        .tab-button:nth-child(4) { animation-delay: 0.2s; }
        .tab-button:nth-child(5) { animation-delay: 0.25s; }
        .tab-button:nth-child(6) { animation-delay: 0.3s; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero-card">
            
            <!-- Изображение группы -->
            <div class="group-image-wrapper">
                <img src="photo_2026-03-26_07-43-54.jpg" alt="Avantyurist" class="group-image">
            </div>
            
            <!-- Заголовки -->
            <div class="main-title">
                Регламент группы
            </div>
            <div class="group-name">
                Avantyurist
            </div>
            <div class="subtitle">
                <span>📌</span> Правила и механизмы сообщества
            </div>
            
            <!-- Вкладки -->
            <div class="tabs-window">
                <div class="tabs-container">
                    
                    <button class="tab-button" onclick="location.href='joint-projects.html'">
                        <span class="tab-icon">🤝</span>
                        <span class="tab-text">Совместные проекты</span>
                    </button>
                    
                    <button class="tab-button" onclick="location.href='about.html'">
                        <span class="tab-icon">📖</span>
                        <span class="tab-text">Информация о группе</span>
                    </button>
                    
                    <button class="tab-button" onclick="location.href='invest.html'">
                        <span class="tab-icon">💰</span>
                        <span class="tab-text">Одиночное инвестирование</span>
                    </button>
                    
                    <button class="tab-button" onclick="location.href='reputation.html'">
                        <span class="tab-icon">⭐</span>
                        <span class="tab-text">Система репутации участников</span>
                    </button>
                    
                    <button class="tab-button" onclick="location.href='verification.html'">
                        <span class="tab-icon">✅</span>
                        <span class="tab-text">Верификация участников</span>
                    </button>
                    
                    <button class="tab-button" onclick="location.href='rating.html'">
                        <span class="tab-icon">🏆</span>
                        <span class="tab-text">Рейтинг участников</span>
                        <span class="badge-new">NEW</span>
                    </button>
                    
                </div>
            </div>
            
            <!-- Декоративная линия и подсказка -->
            <div class="decor-line"></div>
            <div class="info-text">
                <p>📋 Выберите вкладку — откроется подробная информация</p>
                <p>🔽 Можно листать окно вниз</p>
            </div>
        </div>
    </div>
</body>
</html>
