<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Рейтинг участников | Avantyurist</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Кнопка назад */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            text-decoration: none;
            padding: 0.7rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        /* Заголовок */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        /* Карточки статистики */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            color: white;
            transition: transform 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: 800;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        /* Таблица рейтинга */
        .rating-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .rating-header {
            padding: 1.2rem 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .rating-header h2 {
            color: white;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 0 0.5rem 0.5rem 0.5rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        td {
            padding: 1rem;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Медали */
        .position {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .gold {
            color: #ffd700;
        }

        .silver {
            color: #c0c0c0;
        }

        .bronze {
            color: #cd7f32;
        }

        /* Бейдж уровня */
        .level-badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Загрузка и ошибки */
        .loading, .error, .empty {
            text-align: center;
            padding: 3rem;
            color: white;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Кнопка "Попробовать снова" без вращения */
        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            margin-top: 1rem;
            transition: background 0.3s;
        }

        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Адаптив */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            th, td {
                padding: 0.7rem;
                font-size: 0.8rem;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← На главную</a>

        <div class="header">
            <h1>🏆 Рейтинг участников</h1>
            <p>Avantyurist — сообщество инициативных людей</p>
        </div>

        <!-- Статистика -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">—</div>
                <div class="stat-label">Участников</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalProjects">—</div>
                <div class="stat-label">Проектов</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPoints">—</div>
                <div class="stat-label">Всего очков</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgPoints">—</div>
                <div class="stat-label">Средний рейтинг</div>
            </div>
        </div>
        <div id="lastUpdate" style="text-align: center; color: rgba(255,255,255,0.6); font-size: 0.7rem; margin-top: 1rem;"></div>

        <!-- Таблица рейтинга -->
        <div class="rating-container">
            <div class="rating-header">
                <h2>📊 Таблица лидеров</h2>
                <button class="refresh-btn" onclick="loadRating()">🔄 Обновить</button>
            </div>
            <div class="table-wrapper" id="ratingTable">
                <div class="loading">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem;">Загрузка рейтинга...</p>
                </div>
            </div>
        </div>
    </div>

<script>
    // Используем API бота на Railway
   const RATING_JSON_URL = 'https://raw.githubusercontent.com/poverzhukilya-ops/telegram-verification-bot/main/data/rating.json';
    async function loadRating() {
        const tableContainer = document.getElementById('ratingTable');
        
        try {
            const response = await fetch(RATING_JSON_URL + '?t=' + Date.now());
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            if (data.success && data.data && data.data.length > 0) {
                const totalUsers = data.total || data.data.length;
                const totalPoints = data.data.reduce((sum, u) => sum + u.points, 0);
                const totalProjects = data.data.reduce((sum, u) => sum + (u.projects || 0), 0);
                
                document.getElementById('totalUsers').textContent = totalUsers;
                document.getElementById('totalProjects').textContent = totalProjects;
                document.getElementById('totalPoints').textContent = totalPoints;
                document.getElementById('avgPoints').textContent = Math.round(totalPoints / totalUsers);
                
                displayRatingTable(data.data);
                
                if (data.updated_at) {
                    const updateTime = new Date(data.updated_at).toLocaleString();
                    const updateElem = document.getElementById('lastUpdate');
                    if (updateElem) updateElem.innerHTML = `<small>Обновлено: ${updateTime}</small>`;
                }
            } else {
                tableContainer.innerHTML = '<div class="empty">📭 Пока нет участников в рейтинге</div>';
            }
            
        } catch (error) {
            console.error('Ошибка:', error);
            tableContainer.innerHTML = `
                <div class="error">
                    ❌ Не удалось загрузить рейтинг: ${error.message}<br>
                    <button class="retry-btn" onclick="loadRating()">🔄 Попробовать снова</button>
                </div>
            `;
        }
    }

    function displayRatingTable(users) {
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Участник</th>
                        <th>Очки</th>
                        <th>Уровень</th>
                        <th>Проекты</th>
                        <th>Инвестиции</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        users.forEach(user => {
            let medal = '';
            let medalClass = '';
            
            if (user.position === 1) {
                medal = '🥇';
                medalClass = 'gold';
            } else if (user.position === 2) {
                medal = '🥈';
                medalClass = 'silver';
            } else if (user.position === 3) {
                medal = '🥉';
                medalClass = 'bronze';
            }
            
            const name = user.name || `@${user.username}`;
            
            let investments = '0 ₽';
            if (user.investments >= 1000000) {
                investments = (user.investments / 1000000).toFixed(1) + 'M ₽';
            } else if (user.investments >= 1000) {
                investments = (user.investments / 1000).toFixed(1) + 'K ₽';
            } else if (user.investments > 0) {
                investments = user.investments + ' ₽';
            }
            
            html += `
                <tr>
                    <td class="position ${medalClass}">${medal || user.position}</td>
                    <td><strong>${escapeHtml(name)}</strong></td>
                    <td><strong>${user.points}</strong></td>
                    <td><span class="level-badge">Ур. ${user.level}</span></td>
                    <td>${user.projects || 0}</td>
                    <td>${investments}</td>
                </tr>
            `;
        });
        
        html += `
                </tbody>
            </table>
        `;
        
        document.getElementById('ratingTable').innerHTML = html;
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Загружаем при открытии
    loadRating();
    
    // Автообновление каждые 30 секунд
    setInterval(loadRating, 30000);
</script>
</body>
</html>
